<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 270px;
      margin: 0;
      padding: 14px 16px;
      font: 13px/1.4 "Segoe UI", Roboto, system-ui, sans-serif;
      color: #0f0f0f;
      background: #fff;
    }
    h1 { font-size: 14px; margin: 0 0 4px; }
    p.sub { margin: 0 0 12px; color: #606060; font-size: 12px; }
    label {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 9px 10px; border: 1px solid #e0e0e0; border-radius: 8px;
      margin-bottom: 8px; cursor: pointer;
    }
    label:hover { background: #f7f7f7; }
    label.active { border-color: #3ea6ff; background: #eef6ff; }
    input { margin-top: 2px; }
    .opt-title { font-weight: 600; }
    .opt-desc { color: #606060; font-size: 12px; }
    .note { margin-top: 6px; font-size: 11px; color: #909090; }
  </style>
</head>
<body>
  <h1>YouTube Original Audio</h1>
  <p class="sub">Disables forced auto-dubbing and restores the original audio track.</p>

  <label id="lbl-original">
    <input type="radio" name="mode" value="original">
    <span>
      <span class="opt-title">Original (recommended)</span><br>
      <span class="opt-desc">Auto-dubbed videos open with their original audio track.</span>
    </span>
  </label>

  <label id="lbl-off">
    <input type="radio" name="mode" value="off">
    <span>
      <span class="opt-title">Don't intervene</span><br>
      <span class="opt-desc">Default YouTube behavior (dubbed audio).</span>
    </span>
  </label>

  <div class="note">Changing this reloads the active YouTube tab. You can also toggle with the <b>ORIG/DUB</b> button in the player.</div>

  <script src="popup.js"></script>
</body>
</html>
